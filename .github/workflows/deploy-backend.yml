name: Deploy Backend (Render)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Typecheck before deploy
        working-directory: backend
        run: npx tsc --noEmit

      - name: Trigger Render deploy
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Render deploy trigger failed — HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Render deploy triggered"

      - name: Wait and health check
        run: |
          echo "Waiting 90s for Render to build and start..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BACKEND_URL }}/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Backend health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Backend healthy at ${{ secrets.RENDER_BACKEND_URL }}/health"
